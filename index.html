<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dandan Generator BR</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #009c3b, #ffdf00);
      color: #002776;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #fff;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      border: 5px solid #002776;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 24px;
    }

    .foto {
      width: 100%;
      padding: 10px;
      background: #ffdf00;
      border: 5px solid #009c3b;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .foto img {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 4px solid #002776;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, textarea, button {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      border: 2px solid #002776;
      padding: 12px;
      margin-top: 6px;
    }

    textarea {
      min-height: 190px;
      resize: none;
    }

    button {
      margin-top: 14px;
      background: #009c3b;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button.copiar {
      background: #002776;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      color: #009c3b;
    }
  </style>
</head>
<body>

<div class="container">

  <div id="formulario">
    <h1>🇧🇷 Dandan Simulator 🇧🇷</h1>

    <div class="foto">
      <img src="dandan2.png" alt="Dandan">
    </div>

    <label>Time que ganhou</label>
    <input id="ganhou">

    <label>Time que perdeu</label>
    <input id="perdeu">

    <label>Jogador que tava bichado</label>
    <input id="jogador">

    <button onclick="gerarTexto()">Gerar texto</button>
  </div>

  <div id="resultadoTela" style="display:none;">
      <h1>🇧🇷 Resultado</h1>

      <div class="foto">
          <img src="dandan.png" alt="Dandan 2">
      </div>

      <textarea id="resultado" readonly></textarea>

      <button onclick="copiarTexto()">📋 Copiar</button>
      <button onclick="voltar()">⬅️ Voltar</button>

      <div class="msg" id="msg"></div>
  </div>

</div>

<script>
function gerarTexto() {
  const ganhou = document.getElementById("ganhou").value;
  const perdeu = document.getElementById("perdeu").value;
  const jogador = document.getElementById("jogador").value;

  const texto =
`É complicado. Se o ${perdeu} ganha, falam que o ${ganhou} não deu tudo de si e não se importa com essa competição. Se o ${ganhou} ganha no tempo normal ou prorrogação, falam que o ${perdeu} é muito inferior kkkk a galera tem que decidir uai... Caímos, mas jogamos de igual pra igual. Tiveram que puxar o ${jogador} bichado do banco kkkkk mas é isso aí. Mérito do ${ganhou}.`;

  document.getElementById("resultado").value = texto;

  document.getElementById("formulario").style.display = "none";
  document.getElementById("resultadoTela").style.display = "block";
}

function copiarTexto() {
  navigator.clipboard.writeText(
    document.getElementById("resultado").value
  );

  document.getElementById("msg").innerHTML = "✅ Copiado!";
}

function voltar() {
  document.getElementById("resultadoTela").style.display = "none";
  document.getElementById("formulario").style.display = "block";
  document.getElementById("msg").innerHTML = "";
}
</script>

</body>
</html>
