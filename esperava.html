<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dandan Simulator BR</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #009c3b, #ffdf00);
      color: #002776;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #fff;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      border: 5px solid #002776;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 24px;
    }

    .foto {
      width: 100%;
      padding: 10px;
      background: #ffdf00;
      border: 5px solid #009c3b;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .foto img {
      width: 100%;
      display: block;
      border-radius: 12px;
      border: 4px solid #002776;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input,
    textarea,
    button {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      border: 2px solid #002776;
      padding: 12px;
      margin-top: 6px;
    }

    textarea {
      min-height: 190px;
      resize: none;
    }

    button {
      margin-top: 14px;
      background: #009c3b;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button.copiar {
      background: #002776;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      color: #009c3b;
    }

    .idiomas {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .idiomas button {
      width: 55px;
      padding: 8px;
      font-size: 28px;
      cursor: pointer;
    }

    .menu {
      width: 100%;
      max-width: 420px;
      /* igual ao .container */
      margin: 0 auto 20px;
      display: flex;
      background: #002776;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .2);
    }

    .menu-item {
      text-decoration: none;
      flex: 1;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, .7);
      padding: 12px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: .2s;
    }

    .menu-item .material-symbols-rounded {
      font-size: 30px;
    }

    .menu-item span:last-child {
      font-size: 12px;
      font-weight: 700;
    }

    .menu-item.active {
      background: rgba(255, 255, 255, .15);
      color: #fff;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    @media (max-width: 420px) {
      .menu {
        margin-bottom: 16px;
      }

      .menu-item {
        padding: 10px 2px;
      }

      .menu-item .material-symbols-rounded {
        font-size: 26px;
      }

      .menu-item span:last-child {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <header class="menu">
    <a href="index.html" class="menu-item">
      <span class="material-symbols-rounded">chat</span>
      <span>Dandan</span>
    </a>

    <a href="praticando.html" class="menu-item">
      <span class="material-symbols-rounded">sports_soccer</span>
      <span>Praticando</span>
    </a>

    <a href="esperava.html" class="menu-item active">
      <span class="material-symbols-rounded">history_edu</span>
      <span>Esperando</span>
    </a>
  </header>
  <div class="container">

    <div id="formulario">
      <h1>🇧🇷 Dandan Simulator 🇧🇷</h1>

      <div class="foto">
        <img src="dandan2.png" alt="Dandan">
      </div>

      <label>Esperava mais de quem</label>
      <input id="jogador">

      <button onclick="gerarTexto()">Gerar texto</button>
    </div>

    <div id="resultadoTela" style="display:none;">
      <h1>🇧🇷 Resultado</h1>

      <div class="foto">
        <img src="dandan.png" alt="Dandan 2">
      </div>
      <div class="idiomas">
        <button onclick="trocarIdioma('pt')">🇧🇷</button>
        <button onclick="trocarIdioma('en')">🇺🇸</button>
        <button onclick="trocarIdioma('es')">🇪🇸</button>
        <button onclick="trocarIdioma('ja')">🇯🇵</button>
        <button onclick="trocarIdioma('ar')">🇸🇦</button>
      </div>
      <textarea id="resultado" readonly></textarea>

      <button onclick="copiarTexto()">📋 Copiar</button>
      <button onclick="voltar()">⬅️ Voltar</button>

      <div class="msg" id="msg"></div>
    </div>

  </div>

  <script>
    let dados = {};
    function gerarTexto() {
      const jogador = document.getElementById("jogador").value;

      dados = {
        jogador
      };

      document.getElementById("formulario").style.display = "none";
      document.getElementById("resultadoTela").style.display = "block";

      trocarIdioma("pt");
    }
    function copiarTexto() {
      navigator.clipboard.writeText(
        document.getElementById("resultado").value
      );

      document.getElementById("msg").innerHTML = "✅ Copiado!";
    }

    function voltar() {
      document.getElementById("resultadoTela").style.display = "none";
      document.getElementById("formulario").style.display = "block";
      document.getElementById("msg").innerHTML = "";
    }
    function trocarIdioma(idioma) {
      const { ganhou, perdeu, jogador } = dados;

      const textos = {
        pt: `Esperava mais dessa ${jogador}.`,

        en: `I expected more from ${jogador}.`,

        es: `Esperaba más de ${jogador}.`,

        ja: `${jogador}にはもっと期待していました。`,

        ar: `كنت أتوقع أكثر من ${jogador}.`
      };

      document.getElementById("resultado").value = textos[idioma];
    }
  </script>

</body>

</html>
